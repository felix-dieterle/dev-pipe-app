name: Build & Pre-Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Validate signing secrets
        run: |
          MISSING=""
          [ -z "${KEYSTORE_BASE64// /}" ] && MISSING="$MISSING KEYSTORE_BASE64"
          [ -z "${KEYSTORE_PASSWORD// /}" ] && MISSING="$MISSING KEYSTORE_PASSWORD"
          [ -z "${KEY_ALIAS// /}" ] && MISSING="$MISSING KEY_ALIAS"
          [ -z "${KEY_PASSWORD// /}" ] && MISSING="$MISSING KEY_PASSWORD"
          if [ -n "$MISSING" ]; then
            echo "::error::Missing required secrets:$MISSING. Configure them in Settings → Secrets and variables → Actions."
            exit 1
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}

      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | tr -d '[:space:]' | base64 --decode > ${{ github.workspace }}/keystore.jks

      - name: Build signed release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_TYPE: ${{ secrets.KEYSTORE_TYPE }}

      - name: Determine version name
        id: version
        run: |
          VERSION_NAME=$(./gradlew -q :app:printVersionName)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=${VERSION_NAME}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pre-release-${{ steps.version.outputs.version }}
          name: Pre-Release ${{ steps.version.outputs.version }}
          prerelease: true
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: rm -f ${{ github.workspace }}/keystore.jks
