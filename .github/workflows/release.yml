name: Build & Pre-Release APK

on:
  push:
    branches:
      - main

jobs:
  build:
    name: Build Signed Release APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Resolve keystore and credentials
        id: keystore
        run: |
          if [ -n "${KEYSTORE_BASE64// /}" ]; then
            echo "Using keystore from repository secrets."
            MISSING=""
            [ -z "${KEYSTORE_PASSWORD// /}" ] && MISSING="$MISSING KEYSTORE_PASSWORD"
            [ -z "${KEY_ALIAS// /}" ]          && MISSING="$MISSING KEY_ALIAS"
            [ -z "${KEY_PASSWORD// /}" ]        && MISSING="$MISSING KEY_PASSWORD"
            if [ -n "$MISSING" ]; then
              echo "::error::KEYSTORE_BASE64 is set but the following secrets are missing:$MISSING. Configure them in Settings → Secrets and variables → Actions."
              exit 1
            fi
            echo "$KEYSTORE_BASE64" | tr -d '[:space:]' | base64 --decode > "${{ github.workspace }}/keystore.jks"
            echo "ks_password=$KEYSTORE_PASSWORD" >> $GITHUB_OUTPUT
            echo "ks_alias=$KEY_ALIAS"            >> $GITHUB_OUTPUT
            echo "ks_key_password=$KEY_PASSWORD"  >> $GITHUB_OUTPUT
            echo "ks_type=${KEYSTORE_TYPE:-JKS}"  >> $GITHUB_OUTPUT
          else
            echo "::warning::Signing secrets not configured — falling back to the repo-stored CI keystore. Do NOT ship this APK to end users."
            cat "${{ github.workspace }}/keystore/debug-release.b64" | tr -d '[:space:]' | base64 --decode > "${{ github.workspace }}/keystore.jks"
            echo "ks_password=cipassword" >> $GITHUB_OUTPUT
            echo "ks_alias=release-key"   >> $GITHUB_OUTPUT
            echo "ks_key_password=cipassword" >> $GITHUB_OUTPUT
            echo "ks_type=JKS"            >> $GITHUB_OUTPUT
          fi
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          KEYSTORE_TYPE: ${{ secrets.KEYSTORE_TYPE }}

      - name: Build signed release APK
        run: ./gradlew assembleRelease
        env:
          KEYSTORE_PATH: ${{ github.workspace }}/keystore.jks
          KEYSTORE_PASSWORD: ${{ steps.keystore.outputs.ks_password }}
          KEY_ALIAS: ${{ steps.keystore.outputs.ks_alias }}
          KEY_PASSWORD: ${{ steps.keystore.outputs.ks_key_password }}
          KEYSTORE_TYPE: ${{ steps.keystore.outputs.ks_type }}

      - name: Determine version name
        id: version
        run: |
          VERSION_NAME=$(./gradlew -q :app:printVersionName)
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "version=${VERSION_NAME}-${SHORT_SHA}" >> $GITHUB_OUTPUT

      - name: Create GitHub Pre-Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: pre-release-${{ steps.version.outputs.version }}
          name: Pre-Release ${{ steps.version.outputs.version }}
          prerelease: true
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Clean up keystore
        if: always()
        run: rm -f ${{ github.workspace }}/keystore.jks
